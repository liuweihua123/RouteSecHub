<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RouteSecHub</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When a route like /RouteSecHub/datasets is accessed directly,
      // GitHub Pages returns 404.html. This script redirects to index.html
      // with the path stored as a query parameter so the SPA can restore it.
      var pathSegmentsToKeep = 1; // keep "/RouteSecHub/"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
